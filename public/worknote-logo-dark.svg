<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="iconGradDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9D7FFF"/>
      <stop offset="100%" stop-color="#6C47FF"/>
    </linearGradient>
    <linearGradient id="nodeGradDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4BBFF"/>
      <stop offset="100%" stop-color="#A07AFF"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="0" width="120" height="120" rx="26" fill="#1E1530"/>
  <rect x="1" y="1" width="118" height="118" rx="25" fill="none" stroke="#6C47FF" stroke-width="1.5" opacity="0.4"/>

  <!-- W strokes -->
  <polyline points="22,34 38,86 60,52 82,86 98,34"
    stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>

  <!-- Node dots -->
  <circle cx="22" cy="34" r="6.5" fill="url(#nodeGradDark)"/>
  <circle cx="98" cy="34" r="6.5" fill="url(#nodeGradDark)"/>
  <circle cx="60" cy="52" r="6.5" fill="url(#nodeGradDark)"/>
  <circle cx="38" cy="86" r="5"   fill="white" opacity="0.5"/>
  <circle cx="82" cy="86" r="5"   fill="white" opacity="0.5"/>

  <!-- P2P connector -->
  <line x1="22" y1="34" x2="98" y2="34" stroke="#9D7FFF" stroke-width="1" opacity="0.25" stroke-dasharray="3 4"/>

  <!-- Wordmark dark -->
  <text x="145" y="64"
    font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="42"
    font-weight="500"
    letter-spacing="-1"
    fill="#F0F0F0">Work</text>

  <text x="247" y="64"
    font-family="'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="-1"
    fill="#9D7FFF">Note</text>

  <!-- Tagline dark -->
  <text x="146" y="88"
    font-family="'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="0.5"
    fill="#666">Decentralized · Serverless · Free forever</text>
</svg>
