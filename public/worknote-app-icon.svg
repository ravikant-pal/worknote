<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#4A1FCC"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4BBFF"/>
      <stop offset="100%" stop-color="#A07AFF"/>
    </linearGradient>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- Subtle inner shadow ring -->
  <rect x="1" y="1" width="510" height="510" rx="111" fill="none"
    stroke="white" stroke-width="1.5" opacity="0.1"/>

  <!-- W mark, large and centered -->
  <!-- Main W strokes -->
  <polyline
    points="88,148 168,368 256,224 344,368 424,148"
    stroke="white"
    stroke-width="38"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.97"
  />

  <!-- Glow layer behind nodes -->
  <circle cx="88"  cy="148" r="36" fill="#BFA0FF" opacity="0.25" filter="url(#softglow)"/>
  <circle cx="424" cy="148" r="36" fill="#BFA0FF" opacity="0.25" filter="url(#softglow)"/>
  <circle cx="256" cy="224" r="30" fill="#BFA0FF" opacity="0.2"  filter="url(#softglow)"/>

  <!-- Node dots — top left -->
  <circle cx="88"  cy="148" r="22" fill="url(#nodeTop)"/>
  <circle cx="88"  cy="148" r="10" fill="white" opacity="0.6"/>

  <!-- Node dot — top right -->
  <circle cx="424" cy="148" r="22" fill="url(#nodeTop)"/>
  <circle cx="424" cy="148" r="10" fill="white" opacity="0.6"/>

  <!-- Node dot — valley center -->
  <circle cx="256" cy="224" r="18" fill="url(#nodeTop)"/>
  <circle cx="256" cy="224" r="8"  fill="white" opacity="0.55"/>

  <!-- Node dots — bottom -->
  <circle cx="168" cy="368" r="14" fill="white" opacity="0.5"/>
  <circle cx="344" cy="368" r="14" fill="white" opacity="0.5"/>

  <!-- P2P connector line between top two nodes (very subtle) -->
  <line x1="88" y1="148" x2="424" y2="148"
    stroke="white" stroke-width="1.5" opacity="0.12" stroke-dasharray="10 14"/>
</svg>
