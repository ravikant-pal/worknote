<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkNote — Decentralized Note Sharing</title>
    <meta
      name="description"
      content="A free, private, offline-first note-taking app. No account, no server, no subscription. Share notes securely with end-to-end encryption."
    />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://ravikant-pal.github.io/worknote/"
    />
    <meta property="og:title" content="WorkNote — Decentralized Note Sharing" />
    <meta
      property="og:description"
      content="A free, private, offline-first note-taking app. No account, no server, no subscription. Share notes securely with end-to-end encryption."
    />
    <meta
      property="og:image"
      content="https://ravikant-pal.github.io/worknote/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="WorkNote" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="WorkNote — Decentralized Note Sharing"
    />
    <meta
      name="twitter:description"
      content="A free, private, offline-first note-taking app. No account, no server, no subscription."
    />
    <meta
      name="twitter:image"
      content="https://ravikant-pal.github.io/worknote/og-image.png"
    />

    <!-- PWA -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="WorkNote" />

    <!-- Icons -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="/worknote/worknote-favicon.svg"
    />
    <link rel="apple-touch-icon" href="/worknote/icons/icon-192x192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
